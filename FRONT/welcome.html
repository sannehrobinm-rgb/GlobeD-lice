<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Globe Délice</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" href="public/images/logo2.png" as="image">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Cinzel:wght@400;500&display=swap" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Cinzel:wght@400;500&display=swap"></noscript>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --gold: #c9a227;
      --gold-dim: rgba(201,162,39,0.6);
      --gold-faint: rgba(201,162,39,0.15);
      --bg: #090433;
      --cream: #fdf6e3;
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
    }

    body {
      background: var(--bg);
      height: 100vh;
      overflow: hidden;
      font-family: 'Cormorant Garamond', serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Fond ambiant */
    .bg-glow {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 50% 40%, rgba(221,170,32,0.09) 0%, transparent 70%),
        radial-gradient(ellipse 40% 30% at 20% 75%, rgba(217,148,74,0.05) 0%, transparent 60%),
        radial-gradient(ellipse 30% 25% at 80% 60%, rgba(184,138,20,0.04) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* Grain subtil */
    .grain {
      position: fixed;
      inset: 0;
      opacity: 0.035;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-size: 256px;
      pointer-events: none;
      z-index: 0;
    }

    /* Lignes horizontales décoratives */
    .rule {
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(201,162,39,0.4), transparent);
      pointer-events: none;
      z-index: 1;
    }
    .rule.top    { top: 10%;    width: 65%; }
    .rule.bottom { bottom: 10%; width: 45%; }

    /* Coins ornementaux */
    .corner {
      position: fixed;
      width: 56px;
      height: 56px;
      opacity: 0.38;
      pointer-events: none;
      z-index: 1;
    }
    .corner svg { width: 100%; height: 100%; }
    .corner.tl { top: 18px; left: 18px; }
    .corner.tr { top: 18px; right: 18px; transform: scaleX(-1); }
    .corner.bl { bottom: 18px; left: 18px; transform: scaleY(-1); }
    .corner.br { bottom: 18px; right: 18px; transform: scale(-1); }

    /* Contenu central */
    #welcome-screen {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      text-align: center;
      padding: 0 1.5rem;
    }

    /* Eyebrow */
    .eyebrow {
      font-family: 'Cinzel', serif;
      font-size: 0.62rem;
      letter-spacing: 0.45em;
      color: rgba(201,162,39,0.65);
      text-transform: uppercase;
      margin-bottom: 1.6rem;
      animation: fadeUp 0.9s 0.15s ease both;
    }

    /* Logo avec scintillement */
    .logo-wrap {
      animation: logoAppear 1.2s cubic-bezier(0.34,1.4,0.64,1) both;
      cursor: pointer;
      display: block;
    }

    .welcome-logo {
      width: min(300px, 72vw);
      height: auto;
      display: block;
      filter:
        drop-shadow(0 0 28px rgba(201,162,39,0.45))
        drop-shadow(0 0 70px rgba(201,162,39,0.18));
      animation: logoGlow 3s ease-in-out infinite;
      transition: filter 0.35s ease;
    }

    .logo-wrap:hover .welcome-logo,
    .logo-wrap:focus .welcome-logo {
      filter:
        drop-shadow(0 0 40px rgba(201,162,39,0.7))
        drop-shadow(0 0 100px rgba(201,162,39,0.35))
        drop-shadow(0 0 150px rgba(201,162,39,0.15));
    }

    @keyframes logoGlow {
      0%, 100% {
        filter: drop-shadow(0 0 28px rgba(201,162,39,0.45)) drop-shadow(0 0 70px rgba(201,162,39,0.18));
      }
      50% {
        filter: drop-shadow(0 0 45px rgba(201,162,39,0.65)) drop-shadow(0 0 100px rgba(201,162,39,0.28));
      }
    }

    @keyframes logoAppear {
      from { opacity: 0; transform: scale(0.55) rotate(-4deg); }
      to   { opacity: 1; transform: scale(1) rotate(0deg); }
    }

    /* Ornement */
    .ornament {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      margin: 1.4rem 0 1.1rem;
      animation: fadeUp 0.9s 0.55s ease both;
    }
    .orn-line      { width: 75px; height: 1px; background: linear-gradient(90deg, transparent, rgba(201,162,39,0.65)); }
    .orn-line.r    { background: linear-gradient(90deg, rgba(201,162,39,0.65), transparent); }
    .orn-diamond   { width: 6px; height: 6px; background: var(--gold); transform: rotate(45deg); box-shadow: 0 0 8px rgba(201,162,39,0.65); }

    /* Tagline */
    .tagline {
      font-size: clamp(0.95rem, 2.5vw, 1.1rem);
      color: rgba(255,255,255,0.55);
      font-style: italic;
      letter-spacing: 0.03em;
      line-height: 1.75;
      max-width: 400px;
      animation: fadeUp 0.9s 0.65s ease both;
    }

    /* Boutons */
    .welcome-btns {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.9rem;
      margin-top: 1.9rem;
      animation: fadeUp 0.9s 0.8s ease both;
    }

    .btn-primary, .btn-secondary {
      padding: 0.65rem 1.7rem;
      min-height: 46px;
      min-width: 110px;
      border-radius: 2px;
      font-family: 'Cinzel', serif;
      font-size: 0.78rem;
      letter-spacing: 0.14em;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s, background 0.25s;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .btn-primary {
      background: linear-gradient(135deg, #c9a227 0%, #7a5c10 60%, #3d2c06 100%);
      color: var(--cream);
      border: none;
      box-shadow: 0 4px 22px rgba(201,162,39,0.28), inset 0 1px 0 rgba(255,255,255,0.12);
    }

    .btn-primary:hover, .btn-primary:focus {
      transform: translateY(-3px);
      box-shadow: 0 10px 32px rgba(201,162,39,0.45);
      outline: none;
    }

    .btn-secondary {
      background: transparent;
      color: rgba(201,162,39,0.88);
      border: 1px solid rgba(201,162,39,0.42);
    }

    .btn-secondary:hover, .btn-secondary:focus {
      transform: translateY(-3px);
      background: rgba(201,162,39,0.08);
      border-color: var(--gold);
      box-shadow: 0 8px 24px rgba(201,162,39,0.18);
      outline: none;
    }

    /* Hint bas de page */
    .discover-hint {
      position: fixed;
      bottom: 1.8rem;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Cinzel', serif;
      color: rgba(255,255,255,0.18);
      font-size: 0.58rem;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      white-space: nowrap;
      z-index: 10;
      animation: fadeUp 0.9s 1.1s ease both, pulse 3.5s 2s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes pulse  { 0%,100%{opacity:0.18;} 50%{opacity:0.45;} }
    @keyframes fadeUp { from{opacity:0;transform:translateY(14px);} to{opacity:1;transform:translateY(0);} }

    /* Particules */
    .particle {
      position: fixed;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(201,162,39,0.85), transparent);
      pointer-events: none;
      animation: floatUp linear infinite;
      z-index: 1;
    }

    @keyframes floatUp {
      0%   { transform: translateY(100vh); opacity: 0; }
      10%  { opacity: 0.45; }
      90%  { opacity: 0.15; }
      100% { transform: translateY(-5vh) translateX(15px); opacity: 0; }
    }

    /* Transition zoom */
    #welcome-screen.zoom-out .logo-wrap {
      animation: logoZoom 1s cubic-bezier(0.4,0,1,1) forwards !important;
    }
    @keyframes logoZoom {
      0%   { transform: scale(1); opacity: 1; }
      50%  { transform: scale(8); opacity: 1; }
      100% { transform: scale(22); opacity: 0; }
    }
    #welcome-screen.zoom-out .eyebrow,
    #welcome-screen.zoom-out .ornament,
    #welcome-screen.zoom-out .tagline,
    #welcome-screen.zoom-out .welcome-btns {
      animation: fadeOutFast 0.2s ease forwards !important;
    }
    #welcome-screen.fade-out { animation: screenOut 0.4s ease forwards; }
    @keyframes fadeOutFast { to { opacity: 0; } }
    @keyframes screenOut   { to { opacity: 0; } }

    /* Mobile */
    @media (max-width: 480px) {
      .corner { width: 38px; height: 38px; }
      .welcome-btns { gap: 0.7rem; }
      .btn-primary, .btn-secondary { font-size: 0.72rem; padding: 0.6rem 1.3rem; }
    }
  </style>
</head>
<body>

  <div class="bg-glow" aria-hidden="true"></div>
  <div class="grain"   aria-hidden="true"></div>
  <div class="rule top"    aria-hidden="true"></div>
  <div class="rule bottom" aria-hidden="true"></div>

  <div class="corner tl" aria-hidden="true"><svg viewBox="0 0 60 60" fill="none"><path d="M5 55 L5 5 L55 5" stroke="#c9a227" stroke-width="0.9"/><circle cx="5" cy="5" r="1.8" fill="#c9a227"/></svg></div>
  <div class="corner tr" aria-hidden="true"><svg viewBox="0 0 60 60" fill="none"><path d="M5 55 L5 5 L55 5" stroke="#c9a227" stroke-width="0.9"/><circle cx="5" cy="5" r="1.8" fill="#c9a227"/></svg></div>
  <div class="corner bl" aria-hidden="true"><svg viewBox="0 0 60 60" fill="none"><path d="M5 55 L5 5 L55 5" stroke="#c9a227" stroke-width="0.9"/><circle cx="5" cy="5" r="1.8" fill="#c9a227"/></svg></div>
  <div class="corner br" aria-hidden="true"><svg viewBox="0 0 60 60" fill="none"><path d="M5 55 L5 5 L55 5" stroke="#c9a227" stroke-width="0.9"/><circle cx="5" cy="5" r="1.8" fill="#c9a227"/></svg></div>

  <main id="welcome-screen" role="main">
    <p class="eyebrow" aria-hidden="true">Pâtisseries du monde entier</p>

    <a class="logo-wrap" href="#" onclick="startTransition(); return false;" aria-label="Explorer Globe Délice">
      <img src="public/images/logo2.png" alt="Globe Délice" class="welcome-logo" id="welcome-logo">
    </a>

    <div class="ornament" aria-hidden="true">
      <div class="orn-line"></div>
      <div class="orn-diamond"></div>
      <div class="orn-line r"></div>
    </div>

    <p class="tagline">
      "Le seul moyen de se délivrer d'une tentation,<br>c'est d'y céder."
    </p>

    <nav class="welcome-btns" aria-label="Actions principales">
      <a href="register.html" class="btn-secondary">Inscription</a>
      <!-- <button class="btn-primary" onclick="startTransition()">Explorer</button> -->
      <button class="btn-primary" onclick="startDemo()">Explorer</button>
      <a href="login.html"    class="btn-secondary">Connexion</a>
    </nav>
  </main>

  <p class="discover-hint" aria-hidden="true">✦ &nbsp; Pâtisseries du monde entier &nbsp; ✦</p>

  <script>
    function startDemo() {
  localStorage.setItem("demo_mode", "true");
  localStorage.setItem("token", "demo-token");
  localStorage.setItem("user", JSON.stringify({ id: "demo", email: "demo@globedelice.fr", isDemo: true }));
  startTransition(); // réutilise ton animation existante
}
    // Particules flottantes
    for (let i = 0; i < 18; i++) {
      const p = document.createElement("div");
      p.className = "particle";
      p.setAttribute("aria-hidden", "true");
      const size = Math.random() * 3 + 1.5;
      p.style.cssText = `left:${Math.random()*100}vw;width:${size}px;height:${size}px;animation-duration:${Math.random()*12+10}s;animation-delay:${Math.random()*12}s;`;
      document.body.appendChild(p);
    }

    function startTransition() {
      const screen = document.getElementById("welcome-screen");
      screen.classList.add("zoom-out");
      setTimeout(() => {
        screen.classList.add("fade-out");
        setTimeout(() => { window.location.href = "index.html?transition=true"; }, 400);
      }, 900);
    }
  </script>
</body>
</html>
