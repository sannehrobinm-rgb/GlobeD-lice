<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gourmandises</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
 <link href="https://fonts.googleapis.com/css2?family=Felipa&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>
  <!-- HEADER -->
<header class="site-header">
  <!-- Logo -->
  <div class="logo-container">
    <a href="/">
      <img src="public/images/logo2.png" alt="Logo Gourmandise" class="logo">
    </a>
  </div>

  <!-- Citation -->
  <div class="container-citation">
    <h2>"Le seul moyen de se délivrer d'une tentation, c'est d'y céder."</h2>
  </div>
</header>

<!-- <container-logo><img src="public/images/logo2.png" alt="Logo de mon site"></container-logo> -->
  
<!-- BARRE DE RECHERCHE -->
  <div class="search-container">
    <input type="text" id="search" placeholder="Rechercher une pâtisserie...">
   <!--  <select id="categorie" required>
      <option value="patisseries-française">Pâtisseries françaises</option>
      <option value="patisseries_europeennes">Pâtisseries européennes</option>
      <option value="patisseries_americaines">Pâtisseries américaines</option>
    </select> -->
  </div>

  <!-- CONTENEUR PRINCIPAL -->
  <div class="main-container">

    <!-- GAUCHE : colonnes pâtisseries -->
    <div id="cards-container"></div>

    <!-- MILIEU : slider + carte cliquée -->
    <div id="search-results"></div>

    <!-- DROITE : carte Leaflet -->
    <div id="map-column">
      <h2 class="map-title">🗺️ La meilleure adresse du monde</h2>
      <div id="map"></div>
    </div>

  </div>

  <!-- SCRIPT JS -->
  <script src="script.js"></script>
</body>
</html>
