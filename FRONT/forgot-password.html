<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mot de passe oublié - Globe Délice</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Jost:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a1108;
      font-family: 'Jost', sans-serif;
    }

    .auth-container {
      background: #231a0e;
      border: 1px solid rgba(221, 170, 32, 0.25);
      border-radius: 4px;
      padding: 52px 48px;
      width: 100%;
      max-width: 420px;
      text-align: center;
      box-shadow: 0 0 60px rgba(0,0,0,0.6);
    }

    .auth-container h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 2rem;
      color: #ddaa20;
      margin: 0 0 8px;
      letter-spacing: 0.04em;
    }

    .auth-container .subtitle {
      font-size: 0.82rem;
      color: rgba(221, 170, 32, 0.5);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 36px;
    }

    .auth-container .description {
      font-size: 0.88rem;
      color: rgba(255,255,255,0.5);
      line-height: 1.6;
      margin-bottom: 28px;
    }

    .auth-container input {
      width: 100%;
      padding: 13px 16px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(221, 170, 32, 0.2);
      border-radius: 3px;
      color: #f0e6c8;
      font-family: 'Jost', sans-serif;
      font-size: 0.9rem;
      letter-spacing: 0.03em;
      box-sizing: border-box;
      margin-bottom: 16px;
      transition: border-color 0.2s;
      outline: none;
    }

    .auth-container input:focus {
      border-color: rgba(221, 170, 32, 0.6);
      background: rgba(255,255,255,0.06);
    }

    .auth-container input::placeholder {
      color: rgba(255,255,255,0.25);
    }

    .auth-container button[type="submit"] {
      width: 100%;
      padding: 13px;
      background: transparent;
      border: 1px solid #ddaa20;
      color: #ddaa20;
      font-family: 'Jost', sans-serif;
      font-size: 0.82rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 3px;
      transition: background 0.2s, color 0.2s;
      margin-top: 4px;
    }

    .auth-container button[type="submit"]:hover {
      background: #ddaa20;
      color: #1a1108;
    }

    .auth-container button[type="submit"]:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    #message {
      margin-top: 18px;
      font-size: 0.85rem;
      min-height: 20px;
      line-height: 1.5;
    }

    .auth-links {
      margin-top: 28px;
      padding-top: 24px;
      border-top: 1px solid rgba(221, 170, 32, 0.1);
    }

    .auth-links a {
      color: rgba(221, 170, 32, 0.6);
      text-decoration: none;
      font-size: 0.82rem;
      letter-spacing: 0.05em;
      transition: color 0.2s;
    }

    .auth-links a:hover {
      color: #ddaa20;
    }

    .icon-envelope {
      display: block;
      width: 44px;
      height: 44px;
      margin: 0 auto 24px;
      opacity: 0.6;
    }
  </style>
</head>
<body>
  <div class="auth-container">
    <svg class="icon-envelope" viewBox="0 0 24 24" fill="none" stroke="#ddaa20" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="2" y="4" width="20" height="16" rx="2"/>
      <path d="M2 7l10 7 10-7"/>
    </svg>

    <h1>Mot de passe oublié</h1>
    <p class="subtitle">Globe Délice</p>

    <p class="description">
      Entrez votre adresse email et nous vous enverrons un lien pour réinitialiser votre mot de passe.
    </p>

    <form id="forgotForm">
      <input type="email" id="email" placeholder="Votre adresse email" required autocomplete="email" />
      <button type="submit" id="submitBtn">Envoyer le lien</button>
    </form>

    <p id="message"></p>

    <div class="auth-links">
      <a href="login.html">← Retour à la connexion</a>
    </div>
  </div>

  <script>
    const API = "http://localhost:4242";

    document.getElementById("forgotForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const email = document.getElementById("email").value;
      const msg = document.getElementById("message");
      const btn = document.getElementById("submitBtn");

      btn.disabled = true;
      btn.textContent = "Envoi en cours...";
      msg.textContent = "";

      try {
        const res = await fetch(`${API}/auth/forgot-password`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email }),
        });

        const data = await res.json();

        if (res.ok) {
          msg.style.color = "#7ec88a";
          msg.textContent = "Email envoyé ! Vérifiez votre boîte de réception 📧";
          document.getElementById("forgotForm").style.opacity = "0.4";
          document.getElementById("forgotForm").style.pointerEvents = "none";
        } else {
          msg.style.color = "#e07070";
          msg.textContent = data.message || "Une erreur est survenue.";
          btn.disabled = false;
          btn.textContent = "Envoyer le lien";
        }
      } catch (err) {
        msg.style.color = "#e07070";
        msg.textContent = "Impossible de contacter le serveur.";
        btn.disabled = false;
        btn.textContent = "Envoyer le lien";
      }
    });
  </script>
</body>
</html>
