<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nouveau mot de passe - Globe Délice</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Jost:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a1108;
      font-family: 'Jost', sans-serif;
    }

    .auth-container {
      background: #231a0e;
      border: 1px solid rgba(221, 170, 32, 0.25);
      border-radius: 4px;
      padding: 52px 48px;
      width: 100%;
      max-width: 420px;
      text-align: center;
      box-shadow: 0 0 60px rgba(0,0,0,0.6);
    }

    .auth-container h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 2rem;
      color: #ddaa20;
      margin: 0 0 8px;
      letter-spacing: 0.04em;
    }

    .auth-container .subtitle {
      font-size: 0.82rem;
      color: rgba(221, 170, 32, 0.5);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 36px;
    }

    .auth-container input {
      width: 100%;
      padding: 13px 16px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(221, 170, 32, 0.2);
      border-radius: 3px;
      color: #f0e6c8;
      font-family: 'Jost', sans-serif;
      font-size: 0.9rem;
      letter-spacing: 0.03em;
      box-sizing: border-box;
      margin-bottom: 16px;
      transition: border-color 0.2s;
      outline: none;
    }

    .auth-container input:focus {
      border-color: rgba(221, 170, 32, 0.6);
      background: rgba(255,255,255,0.06);
    }

    .auth-container input::placeholder {
      color: rgba(255,255,255,0.25);
    }

    .password-wrapper {
      position: relative;
      margin-bottom: 16px;
    }

    .password-wrapper input {
      margin-bottom: 0;
      padding-right: 44px;
    }

    .toggle-pw {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      color: rgba(221, 170, 32, 0.4);
      transition: color 0.2s;
    }

    .toggle-pw:hover { color: #ddaa20; }

    .strength-bar {
      height: 3px;
      background: rgba(255,255,255,0.08);
      border-radius: 2px;
      margin-bottom: 20px;
      overflow: hidden;
    }

    .strength-bar-fill {
      height: 100%;
      border-radius: 2px;
      width: 0%;
      transition: width 0.3s, background 0.3s;
    }

    .auth-container button[type="submit"] {
      width: 100%;
      padding: 13px;
      background: transparent;
      border: 1px solid #ddaa20;
      color: #ddaa20;
      font-family: 'Jost', sans-serif;
      font-size: 0.82rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 3px;
      transition: background 0.2s, color 0.2s;
      margin-top: 4px;
    }

    .auth-container button[type="submit"]:hover {
      background: #ddaa20;
      color: #1a1108;
    }

    .auth-container button[type="submit"]:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    #message {
      margin-top: 18px;
      font-size: 0.85rem;
      min-height: 20px;
      line-height: 1.5;
    }

    .auth-links {
      margin-top: 28px;
      padding-top: 24px;
      border-top: 1px solid rgba(221, 170, 32, 0.1);
    }

    .auth-links a {
      color: rgba(221, 170, 32, 0.6);
      text-decoration: none;
      font-size: 0.82rem;
      letter-spacing: 0.05em;
      transition: color 0.2s;
    }

    .auth-links a:hover { color: #ddaa20; }

    .icon-lock {
      display: block;
      width: 40px;
      height: 40px;
      margin: 0 auto 24px;
      opacity: 0.6;
    }

    #token-error {
      color: #e07070;
      font-size: 0.85rem;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <div class="auth-container">
    <svg class="icon-lock" viewBox="0 0 24 24" fill="none" stroke="#ddaa20" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="11" width="18" height="11" rx="2"/>
      <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
    </svg>

    <h1>Nouveau mot de passe</h1>
    <p class="subtitle">Globe Délice</p>

    <p id="token-error"></p>

    <form id="resetForm">
      <div class="password-wrapper">
        <input type="password" id="password" placeholder="Nouveau mot de passe" required autocomplete="new-password" />
        <button type="button" class="toggle-pw" onclick="toggleVisibility('password', this)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>

      <div class="strength-bar">
        <div class="strength-bar-fill" id="strength-fill"></div>
      </div>

      <div class="password-wrapper">
        <input type="password" id="confirm" placeholder="Confirmer le mot de passe" required autocomplete="new-password" />
        <button type="button" class="toggle-pw" onclick="toggleVisibility('confirm', this)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>

      <button type="submit" id="submitBtn">Réinitialiser</button>
    </form>

    <p id="message"></p>

    <div class="auth-links">
      <a href="login.html">← Retour à la connexion</a>
    </div>
  </div>

  <script>
    const API = "http://localhost:4242";
    const token = new URLSearchParams(window.location.search).get("token");

    if (!token) {
      document.getElementById("token-error").textContent = "Lien invalide ou expiré. Veuillez refaire une demande.";
      document.getElementById("resetForm").style.display = "none";
    }

    function toggleVisibility(fieldId, btn) {
      const input = document.getElementById(fieldId);
      const isHidden = input.type === "password";
      input.type = isHidden ? "text" : "password";
      btn.style.color = isHidden ? "#ddaa20" : "rgba(221,170,32,0.4)";
    }

    document.getElementById("password").addEventListener("input", function () {
      const val = this.value;
      const fill = document.getElementById("strength-fill");
      let strength = 0;
      if (val.length >= 8) strength++;
      if (/[A-Z]/.test(val)) strength++;
      if (/[0-9]/.test(val)) strength++;
      if (/[^A-Za-z0-9]/.test(val)) strength++;

      const colors = ["#e07070", "#e09020", "#b0c840", "#7ec88a"];
      const widths = ["25%", "50%", "75%", "100%"];
      fill.style.width = val.length ? widths[strength - 1] || "15%" : "0%";
      fill.style.background = val.length ? colors[strength - 1] || "#e07070" : "transparent";
    });

    document.getElementById("resetForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const password = document.getElementById("password").value;
      const confirm = document.getElementById("confirm").value;
      const msg = document.getElementById("message");
      const btn = document.getElementById("submitBtn");

      if (password !== confirm) {
        msg.style.color = "#e07070";
        msg.textContent = "Les mots de passe ne correspondent pas.";
        return;
      }

      if (password.length < 8) {
        msg.style.color = "#e07070";
        msg.textContent = "Le mot de passe doit contenir au moins 8 caractères.";
        return;
      }

      btn.disabled = true;
      btn.textContent = "Réinitialisation...";
      msg.textContent = "";

      try {
        const res = await fetch(`${API}/auth/reset-password/${token}`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ password }),
        });

        const data = await res.json();

        if (res.ok) {
          msg.style.color = "#7ec88a";
          msg.textContent = "Mot de passe modifié avec succès !";
          document.getElementById("resetForm").style.opacity = "0.4";
          document.getElementById("resetForm").style.pointerEvents = "none";
          setTimeout(() => window.location.href = "login.html", 2000);
        } else {
          msg.style.color = "#e07070";
          msg.textContent = data.message || "Token invalide ou expiré.";
          btn.disabled = false;
          btn.textContent = "Réinitialiser";
        }
      } catch (err) {
        msg.style.color = "#e07070";
        msg.textContent = "Impossible de contacter le serveur.";
        btn.disabled = false;
        btn.textContent = "Réinitialiser";
      }
    });
  </script>
</body>
</html>
